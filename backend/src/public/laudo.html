<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Laudo de Esterilização · Sterilink</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
margin:0;
padding:16px;
}

.container{
max-width:900px;
margin:auto;
background:#ffffff;
padding:28px;
border-radius:8px;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

h1{
text-align:center;
color:#5E2B97;
margin-bottom:4px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#666;
margin-bottom:20px;
}

h2{
border-bottom:2px solid #eee;
padding-bottom:6px;
margin-top:24px;
color:#333;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px dotted #eee;
font-size:14px;
}

.label{
font-weight:bold;
color:#444;
}

.value{
color:#000;
}

.status{
margin-top:16px;
padding:12px;
text-align:center;
font-weight:bold;
border-radius:6px;
font-size:16px;
}

.success{
background:#e6f4ea;
color:#1e7e34;
}

.failure{
background:#fdecea;
color:#c82333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#f0f0f0;
padding:8px;
border:1px solid #ddd;
font-size:13px;
}

td{
padding:6px;
border:1px solid #ddd;
font-size:13px;
text-align:center;
}

footer{
margin-top:30px;
text-align:center;
font-size:12px;
color:#777;
}

.loading{
text-align:center;
font-size:16px;
padding:40px;
}

.error{
text-align:center;
color:red;
padding:40px;
}

</style>

</head>

<body>
  <div class="container" id="app">
    <div class="loading">🔄 Carregando laudo...</div>
  </div>

  <script>
    const app = document.getElementById('app');

    // 🔎 Extrai o ID do laudo da URL
   

    const cycleId = window.location.pathname.split('/').filter(Boolean).pop();

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleString('pt-BR');
    }

    async function carregarLaudo() {
      try {
        const response = await fetch(`/api/laudo/${cycleId}`);

        if (!response.ok) {
          throw new Error('Laudo não encontrado');
        }

        const cycle = await response.json();
        renderLaudo(cycle);

      } catch (err) {
        app.innerHTML = `
          <div class="error">
            ❌ Laudo não encontrado<br/>
            Verifique o QR Code ou o ID do ciclo
          </div>
        `;
      }
    }

   function renderLaudo(cycle){

const statusClass =
cycle.result === "SUCESSO"
? "success"
: "failure";

app.innerHTML = `

<h1>Laudo de Esterilização</h1>

<div class="subtitle">
Sistema Sterilink · Documento público de auditoria
</div>


<h2>Identificação</h2>

<div class="row">
<span class="label">ID do Ciclo</span>
<span class="value">${cycle.id}</span>
</div>

<div class="row">
<span class="label">Modelo</span>
<span class="value">${cycle.model}</span>
</div>

<div class="row">
<span class="label">Serial</span>
<span class="value">${cycle.serialNumber}</span>
</div>

<div class="row">
<span class="label">Versão</span>
<span class="value">${cycle.version || "-"}</span>
</div>

<div class="row">
<span class="label">Equipamento</span>
<span class="value">${cycle.equipmentName || "-"}</span>
</div>

<div class="row">
<span class="label">Programa</span>
<span class="value">${cycle.program}</span>
</div>

<div class="row">
<span class="label">Número do Ciclo</span>
<span class="value">${cycle.cycleNumber}</span>
</div>

<div class="row">
<span class="label">Data Raw</span>
<span class="value">${cycle.rawDateTime || "-"}</span>
</div>

<div class="row">
<span class="label">Início</span>
<span class="value">${formatDate(cycle.startTime)}</span>
</div>

<div class="row">
<span class="label">Fim</span>
<span class="value">${formatDate(cycle.endTime)}</span>
</div>


<h2>Parâmetros Configurados</h2>

<div class="row">
<span class="label">Temperatura Esterilização</span>
<span class="value">${cycle.sterilizationTemperature} °C</span>
</div>

<div class="row">
<span class="label">Tempo Esterilização</span>
<span class="value">${cycle.sterilizationTime} min</span>
</div>

<div class="row">
<span class="label">Tempo Vácuo</span>
<span class="value">${cycle.vacuumTime} min</span>
</div>

<div class="row">
<span class="label">Tempo Secagem</span>
<span class="value">${cycle.dryTime} min</span>
</div>

<div class="row">
<span class="label">Alias Temp</span>
<span class="value">${cycle.sterTemp}</span>
</div>

<div class="row">
<span class="label">Alias Tempo</span>
<span class="value">${cycle.sterTime}</span>
</div>


<h2>Valores Medidos</h2>

<div class="row">
<span class="label">Temp Máx Sensor 1</span>
<span class="value">${Number(cycle.maxTemperature).toFixed(1)} °C</span>
</div>

<div class="row">
<span class="label">Temp Máx Sensor 2</span>
<span class="value">${Number(cycle.maxTemperature2).toFixed(1)} °C</span>
</div>

<div class="row">
<span class="label">Pressão Máxima</span>
<span class="value">${Number(cycle.maxPressure).toFixed(2)} bar</span>
</div>


<h2>Status</h2>

<div class="row">
<span class="label">Ciclo Completo</span>
<span class="value">${cycle.isCompleteCycle}</span>
</div>

<div class="row">
<span class="label">Ciclo Válido</span>
<span class="value">${cycle.isValid}</span>
</div>

<div class="row">
<span class="label">Resultado</span>
<span class="value">${cycle.result}</span>
</div>

${cycle.errorCode ? `
<div class="row">
<span class="label">Código de Erro</span>
<span class="value">${cycle.errorCode}</span>
</div>
` : ""}


<div class="status ${statusClass}">
Resultado do Ciclo: ${cycle.result}
</div>


<h2>Etapas do Ciclo</h2>

<table>

<thead>
<tr>
<th>Stage</th>
<th>Tempo</th>
<th>Temp 1</th>
<th>Temp 2</th>
<th>Pressão</th>
</tr>
</thead>

<tbody>

${
(cycle.stages || [])
.map(stage => `
<tr>
<td>${stage.stage}</td>
<td>${stage.time}</td>
<td>${Number(stage.temperature1).toFixed(1)}</td>
<td>${Number(stage.temperature2).toFixed(1)}</td>
<td>${Number(stage.pressure).toFixed(2)}</td>
</tr>
`)
.join("")
}

</tbody>

</table>

<footer>
Sistema Sterilink · Monitoramento de Esterilização
</footer>

`;

}


async function verificarErro(cycle){

if(
cycle.result === "ERRO" ||
cycle.errorCode
){

try{

await fetch("/api/error-alert",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(cycle)
});

}
catch(e){
console.log("Falha ao enviar alerta");
}

}

}

carregarLaudo();

</script>
</body>
</html>
