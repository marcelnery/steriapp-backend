<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Laudo de Esterilização · Sterilink</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 820px;
      margin: auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #5E2B97;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
    }

    h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
      margin-top: 24px;
      color: #333;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dotted #eee;
      font-size: 14px;
    }

    .label {
      font-weight: bold;
      color: #444;
    }

    .value {
      color: #000;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      border-radius: 6px;
      font-size: 16px;
    }

    .success {
      background: #e6f4ea;
      color: #1e7e34;
    }

    .failure {
      background: #fdecea;
      color: #c82333;
    }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #777;
    }

    .loading {
      text-align: center;
      font-size: 16px;
      padding: 40px;
    }

    .error {
      text-align: center;
      color: red;
      padding: 40px;
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="loading">🔄 Carregando laudo...</div>
  </div>

  <script>
    const app = document.getElementById('app');

    // 🔎 Extrai o ID do laudo da URL
    const cycleId = window.location.pathname.split('/').pop();

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleString('pt-BR');
    }

    async function carregarLaudo() {
      try {
        const response = await fetch(`/api/laudo/${cycleId}`);

        if (!response.ok) {
          throw new Error('Laudo não encontrado');
        }

        const cycle = await response.json();
        renderLaudo(cycle);

      } catch (err) {
        app.innerHTML = `
          <div class="error">
            ❌ Laudo não encontrado<br/>
            Verifique o QR Code ou o ID do ciclo
          </div>
        `;
      }
    }

    function renderLaudo(cycle) {
      const statusClass =
        cycle.result === 'SUCESSO' ? 'success' : 'failure';

      app.innerHTML = `
        <h1>Laudo de Esterilização</h1>
        <div class="subtitle">
          Documento público para auditoria · Sistema Sterilink
        </div>

        <h2>Identificação</h2>
        <div class="row"><span class="label">Modelo</span><span class="value">${cycle.model ?? '-'}</span></div>
        <div class="row"><span class="label">Serial</span><span class="value">${cycle.serialNumber ?? '-'}</span></div>
        <div class="row"><span class="label">Programa</span><span class="value">${cycle.program ?? '-'}</span></div>
        <div class="row"><span class="label">Ciclo</span><span class="value">#${cycle.cycleNumber ?? '-'}</span></div>
        <div class="row"><span class="label">Data</span><span class="value">${formatDate(cycle.startTime)}</span></div>

        <h2>Parâmetros</h2>
        <div class="row"><span class="label">Temp. Esterilização</span><span class="value">${cycle.sterilizationTemperature} °C</span></div>
        <div class="row"><span class="label">Tempo Esterilização</span><span class="value">${cycle.sterilizationTime} min</span></div>
        <div class="row"><span class="label">Vácuo</span><span class="value">${cycle.vacuumTime} min</span></div>
        <div class="row"><span class="label">Secagem</span><span class="value">${cycle.dryTime} min</span></div>

        <h2>Valores Medidos</h2>
        <div class="row"><span class="label">Temp. Máx. Sensor 1</span><span class="value">${cycle.maxTemperature} °C</span></div>
        <div class="row"><span class="label">Temp. Máx. Sensor 2</span><span class="value">${cycle.maxTemperature2} °C</span></div>
        <div class="row"><span class="label">Pressão Máxima</span><span class="value">${cycle.maxPressure} bar</span></div>

        <div class="status ${statusClass}">
          Resultado do Ciclo: ${cycle.result}
        </div>

        <footer>
          Woson · Sterilink<br/>
          Tecnologia em esterilização odontológica
        </footer>
      `;
    }

    carregarLaudo();
  </script>
</body>
</html>
