<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SteriApp - Nova Senha</title>

<style>

body {
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial;
    background:linear-gradient(
      180deg,
      #5E2B97,
      #EDE7F6
    );
}

.card {
    background:white;
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:22px;
    box-shadow:0 10px 30px #0004;
    text-align:center;
}

h1 {
    color:#5E2B97;
}

input {
    width:100%;
    height:50px;
    margin-top:20px;
    font-size:18px;
    padding:8px;
}

button {
    margin-top:25px;
    width:100%;
    height:55px;
    background:#5E2B97;
    color:white;
    border:0;
    border-radius:15px;
    font-size:18px;
}

</style>

</head>


<body>


<div class="card">

<h1>SteriApp</h1>

<h3>Redefinir Senha</h3>


<input 
id="password"
type="password"
placeholder="Digite sua nova senha"
/>


<button onclick="resetPassword()">

Salvar nova senha

</button>


<p id="msg"></p>


</div>


<script>


const params =
new URLSearchParams(window.location.search);


const token =
params.get("token");



async function resetPassword(){


const password =
document.getElementById("password").value;



const response =
await fetch(
"https://backend-nu-nine-29.vercel.app/api/reset-password",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

token:token,

password:password

})

});


if(response.ok){

document.getElementById("msg").innerHTML =
"✅ Senha alterada com sucesso";

}else{

document.getElementById("msg").innerHTML =
"❌ Link expirado ou inválido";

}


}


</script>


</body>


</html>
